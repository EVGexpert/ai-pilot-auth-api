name: Auto Deploy

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ✅ Используем GitHub Secrets
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: JWT_SECRET,GATEWAY_TOKEN,DEPLOY_HEALTH_TOKEN
          timeout: 180s
          script: |
            set -e
            echo "🔵 Deploy started: $(date)"

            # ============================================================
            # Конфигурация
            # ============================================================
            AUTH_DIR=~/ai-pilot-web-chat/auth-api
            DATA_DIR=~/ai-pilot-web-chat/auth-data
            DB_FILE="$DATA_DIR/aipilot.db"
            BACKUP_DIR="$DATA_DIR/backups"
            CONTAINER_NAME=ai-pilot-auth
            IMAGE_NAME=ai-pilot-auth
            HEALTH_RETRIES=5
            HEALTH_INTERVAL=3

            echo "📂 Data directory: $DATA_DIR"

            # ============================================================
            # Шаг 1: Проверка директорий
            # ============================================================
            mkdir -p "$BACKUP_DIR"
            if [ -f "$DB_FILE" ]; then
              DB_SIZE=$(stat -c%s "$DB_FILE" 2>/dev/null || echo 0)
              echo "📦 Current DB: $DB_FILE ($DB_SIZE bytes)"
            else
              echo "📦 No existing DB file found (fresh deploy)"
            fi

            # ============================================================
            # Шаг 2: Graceful stop контейнера (если запущен)
            # ============================================================
            if docker ps -q --filter "name=$CONTAINER_NAME" | grep -q .; then
              echo "🛑 Graceful stop: $CONTAINER_NAME..."
              # Даём sql.js до 30 секунд на сохранение БД
              docker stop -t 30 "$CONTAINER_NAME" || true
              docker rm "$CONTAINER_NAME" || true
              echo "✅ Container stopped and removed"
            else
              echo "ℹ️  Container not running, skipping stop"
            fi

            # ============================================================
            # Шаг 3: Backup БД (после graceful stop — данные актуальны)
            # ============================================================
            if [ -f "$DB_FILE" ] && [ "$DB_SIZE" -gt 0 ] 2>/dev/null; then
              BACKUP_NAME="aipilot-pre-deploy-$(date +%Y%m%d-%H%M%S).db"
              cp "$DB_FILE" "$BACKUP_DIR/$BACKUP_NAME"
              echo "✅ DB backup: $BACKUP_DIR/$BACKUP_NAME ($DB_SIZE bytes)"

              # Проверяем, что бэкап не повреждён
              if [ -f "$BACKUP_DIR/$BACKUP_NAME" ]; then
                BCK_SIZE=$(stat -c%s "$BACKUP_DIR/$BACKUP_NAME" 2>/dev/null || echo 0)
                echo "   Backup size: $BCK_SIZE bytes"
              fi

              # Чистим бэкапы старше 7 дней
              find "$BACKUP_DIR" -name "aipilot-pre-deploy-*.db" -mtime +7 -delete 2>/dev/null || true
            else
              echo "ℹ️  No DB to backup"
            fi

            # ============================================================
            # Шаг 4: Клонирование свежего кода
            # ============================================================
            echo "📥 Cloning fresh code..."
            rm -rf "$AUTH_DIR"
            git clone --depth=1 https://github.com/EVGexpert/ai-pilot-auth-api.git "$AUTH_DIR"
            echo "✅ Code cloned"

            # ============================================================
            # Шаг 5: Сборка образа
            # ============================================================
            echo "🔨 Building Docker image..."
            cd ~/ai-pilot-web-chat
            docker network create aipilot 2>/dev/null || true
            docker build -t "$IMAGE_NAME" auth-api/
            echo "✅ Image built"

            # ============================================================
            # Шаг 6: Запуск нового контейнера
            # ============================================================
            echo "🚀 Starting new container..."
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              --network aipilot \
              --add-host host.docker.internal:host-gateway \
              -p 127.0.0.1:3001:3001 \
              -v "$DATA_DIR:/app/data" \
              -e NODE_ENV=production \
              -e PORT=3001 \
              -e DATABASE_PATH=/app/data/aipilot.db \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e DEPLOY_HEALTH_TOKEN=${{ secrets.DEPLOY_HEALTH_TOKEN }} \
              -e GATEWAY_TOKEN=${{ secrets.GATEWAY_TOKEN }} \
              -e GATEWAY_WS=ws://host.docker.internal:18789 \
              -e APP_URL=https://pilotsite.ru \
              -e TZ=Europe/Kaliningrad \
              "$IMAGE_NAME"

            echo "✅ Container started"

            # ============================================================
            # Шаг 7: Healthcheck — ждём, пока контейнер ответит
            # ============================================================
            echo "⏳ Healthcheck: waiting for container to be ready..."
            sleep 3

            HEALTH_OK=false
            for i in $(seq 1 $HEALTH_RETRIES); do
              HTTP_STATUS=$(docker exec "$CONTAINER_NAME" sh -c "curl -s -o /dev/null -w '%{http_code}' http://localhost:3001/api/health || echo '000'")
              if [ "$HTTP_STATUS" = "200" ]; then
                HEALTH_OK=true
                echo "✅ HTTP healthcheck passed (attempt $i)"
                break
              fi
              echo "⏳ HTTP healthcheck: waiting... ($i/$HEALTH_RETRIES)"
              sleep "$HEALTH_INTERVAL"
            done

            if [ "$HEALTH_OK" != "true" ]; then
              echo "❌ HTTP healthcheck FAILED after $HEALTH_RETRIES attempts"
              exit 1
            fi

            # ============================================================
            # Шаг 8: Проверка БД через /api/health/db (с X-Deploy-Token)
            # ============================================================
            echo "⏳ Checking database integrity..."

            DB_CHECK=$(docker exec "$CONTAINER_NAME" sh -c '
              TOKEN=${DEPLOY_HEALTH_TOKEN:-deploy}
              curl -sf -H "X-Deploy-Token: $TOKEN" http://localhost:3001/api/health/db || echo '{"status":"error"}'
            ')

            NEW_USER_COUNT=$(echo "$DB_CHECK" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('users',0))" 2>/dev/null || echo "0")
            DB_STATUS=$(echo "$DB_CHECK" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null || echo "unknown")

            echo "📊 DB check result: $NEW_USER_COUNT users, status=$DB_STATUS"

            if [ "$DB_STATUS" = "error" ] || [ "$DB_STATUS" = "unknown" ]; then
              echo "❌ DB check failed!"
              exit 1
            fi

            # ============================================================
            # Шаг 9: Rollback при пустой БД (если был бэкап с данными)
            # ============================================================
            if [ "$NEW_USER_COUNT" = "0" ]; then
              echo "⚠️  WARNING: Database has 0 users!"

              LATEST_BACKUP=$(ls -t "$BACKUP_DIR" 2>/dev/null | head -1)
              if [ -n "$LATEST_BACKUP" ] && [ -f "$BACKUP_DIR/$LATEST_BACKUP" ]; then
                BCK_SIZE=$(stat -c%s "$BACKUP_DIR/$LATEST_BACKUP" 2>/dev/null || echo 0)
                if [ "$BCK_SIZE" -gt 100 ]; then  # Непустой бэкап
                  echo "🔄 Rolling back from: $BACKUP_DIR/$LATEST_BACKUP ($BCK_SIZE bytes)"
                  docker stop -t 10 "$CONTAINER_NAME" || true
                  cp "$BACKUP_DIR/$LATEST_BACKUP" "$DB_FILE"
                  docker start "$CONTAINER_NAME" || {
                    echo "❌ Rollback container restart failed!"
                    exit 1
                  }
                  sleep 3

                  # Проверяем после rollback
                  OLD_CHECK=$(docker exec "$CONTAINER_NAME" sh -c '
                    TOKEN=${DEPLOY_HEALTH_TOKEN:-deploy}
                    curl -sf -H "X-Deploy-Token: $TOKEN" http://localhost:3001/api/health/db || echo '{"users":0}'
                  ')

                  OLD_COUNT=$(echo "$OLD_CHECK" | python3 -c "import sys,json; print(json.load(sys.stdin).get('users',0))" 2>/dev/null || echo "0")
                  echo "✅ Rollback complete: $OLD_COUNT users restored"
                else
                  echo "⚠️  Backup is empty too ($BCK_SIZE bytes), skipping rollback"
                fi
              else
                echo "ℹ️  No backup found, skipping rollback (fresh install?)"
              fi
            fi

            # ============================================================
            # Шаг 10: Финальный отчёт
            # ============================================================
            CONTAINER_STATUS=$(docker inspect "$CONTAINER_NAME" --format '{{.State.Status}}' 2>/dev/null || echo "unknown")
            FINAL_DB_CHECK=$(docker exec "$CONTAINER_NAME" sh -c '
              TOKEN=${DEPLOY_HEALTH_TOKEN:-deploy}
              curl -sf -H "X-Deploy-Token: $TOKEN" http://localhost:3001/api/health/db || echo '{}'
            ')

            echo ""
            echo "═══════════════════════════════════════"
            echo "  📋 DEPLOY REPORT"
            echo "═══════════════════════════════════════"
            echo "  Container:    $CONTAINER_NAME ($CONTAINER_STATUS)"
            echo "  DB path:      $DB_FILE"
            echo "  Users:        $(echo "$FINAL_DB_CHECK" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('users','?'))" 2>/dev/null)"
            echo "  Sites:        $(echo "$FINAL_DB_CHECK" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sites','?'))" 2>/dev/null)"
            echo "  Sessions:     $(echo "$FINAL_DB_CHECK" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sessions','?'))" 2>/dev/null)"
            echo "  Schema v:     $(echo "$FINAL_DB_CHECK" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('schemaVersion','?'))" 2>/dev/null)"
            echo "═══════════════════════════════════════"

            docker image prune -f
            echo "✅ Deploy complete: $(date)"
