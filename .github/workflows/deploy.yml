name: Auto Deploy

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: JWT_SECRET,GATEWAY_TOKEN,DEPLOY_HEALTH_TOKEN,DATABASE_URL,DEEPSEEK_API_KEY
          timeout: 180s
          script: |
            set -e
            echo "🔵 Deploy started: $(date)"

            VOLUME_NAME=aipilot-auth-data
            BACKUP_DIR=~/ai-pilot-web-chat/auth-data/backups
            mkdir -p "$BACKUP_DIR"

            # ============================================================
            # Шаг 1: Бэкап БД из Docker volume (если существует)
            # ============================================================
            if docker volume ls -q | grep -q "^$VOLUME_NAME$"; then
              BACKUP_NAME="aipilot-pre-deploy-$(date +%Y%m%d-%H%M%S).db"
              docker run --rm \
                -v "$VOLUME_NAME":/data \
                -v "$BACKUP_DIR":/backup \
                alpine:latest \
                sh -c 'if [ -f /data/aipilot.db ]; then
                  cp /data/aipilot.db "/backup/$BACKUP_NAME"
                  echo "✅ DB backup pulled from volume"
                  ls -la /data/
                else
                  echo "ℹ️  No DB file in volume"
                fi' 2>&1 || echo "⚠️  Backup failed (non-fatal)"
              find "$BACKUP_DIR" -name "aipilot-pre-deploy-*.db" -mtime +7 -delete 2>/dev/null || true
            else
              echo "📦 Creating Docker volume: $VOLUME_NAME"
              docker volume create "$VOLUME_NAME"
            fi

            # ============================================================
            # Шаг 2: Клонируем свежий код
            # ============================================================
            AUTH_DIR=~/ai-pilot-web-chat/auth-api
            rm -rf "$AUTH_DIR"
            git clone --depth=1 https://github.com/EVGexpert/ai-pilot-auth-api.git "$AUTH_DIR"

            # ============================================================
            # Шаг 3: Собираем образ
            # ============================================================
            cd ~/ai-pilot-web-chat
            docker network create aipilot 2>/dev/null || true
            docker build -t ai-pilot-auth auth-api/

            # ============================================================
            # Шаг 4: Graceful stop + запуск с named volume
            # ============================================================
            if docker ps -q --filter "name=ai-pilot-auth" | grep -q .; then
              echo "🛑 Graceful stop: ai-pilot-auth..."
              docker stop -t 30 ai-pilot-auth || true
              docker rm ai-pilot-auth || true
            fi

            docker run -d \
              --name ai-pilot-auth \
              --restart unless-stopped \
              --network aipilot \
              --add-host host.docker.internal:host-gateway \
              -p 127.0.0.1:3001:3001 \
              -v "$VOLUME_NAME":/app/data \
              -e NODE_ENV=production \
              -e PORT=3001 \
              -e DATABASE_PATH=/app/data/aipilot.db \
              -e JWT_SECRET=\${{ secrets.JWT_SECRET }} \
              -e DEPLOY_HEALTH_TOKEN=\${{ secrets.DEPLOY_HEALTH_TOKEN }} \
              -e DEEPSEEK_API_KEY=\${{ secrets.DEEPSEEK_API_KEY }} \
              -e GATEWAY_TOKEN=\${{ secrets.GATEWAY_TOKEN }} \
              -e GATEWAY_WS=ws://host.docker.internal:18789 \
              -e APP_URL=https://pilotsite.ru \
              -e TZ=Europe/Kaliningrad \
              ai-pilot-auth

            # ============================================================
            # Шаг 5: Healthcheck
            # ============================================================
            echo "⏳ Healthcheck..."
            sleep 3
            for i in \$(seq 1 10); do
              STATUS=\$(docker exec ai-pilot-auth sh -c 'curl -sf -o /dev/null -w "%{http_code}" http://localhost:3001/api/health || echo "000"')
              if [ "\$STATUS" = "200" ]; then
                echo "✅ Healthcheck passed (attempt \$i)"
                break
              fi
              echo "⏳ Waiting... (\$i/10)"
              sleep 2
            done

            # ============================================================
            # Шаг 6: Проверка БД и rollback при необходимости
            # ============================================================
            echo "⏳ Проверка БД..."
            sleep 2
            STATS=\$(curl -sf http://localhost:3001/api/stats 2>/dev/null || echo "")
            USER_COUNT=\$(echo "\$STATS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('users',0))" 2>/dev/null || echo "unknown")
            echo "👥 Пользователей: \$USER_COUNT"

            if [ "\$USER_COUNT" = "0" ] || [ "\$USER_COUNT" = "unknown" ]; then
              LATEST_BACKUP=\$(ls -t "\$BACKUP_DIR" 2>/dev/null | head -1)
              if [ -n "\$LATEST_BACKUP" ] && [ -f "\$BACKUP_DIR/\$LATEST_BACKUP" ]; then
                echo "⚠️  DB пуста! Восстанавливаю из: \$LATEST_BACKUP"
                docker stop ai-pilot-auth
                docker run --rm \
                  -v "\$VOLUME_NAME":/data \
                  -v "\$BACKUP_DIR":/backup \
                  alpine:latest \
                  cp "/backup/\$LATEST_BACKUP" /data/aipilot.db
                docker start ai-pilot-auth
                sleep 3
              else
                echo "⚠️  Нет бэкапа (чистый деплой)"
              fi
            fi

            # Сброс пароля
            docker exec ai-pilot-auth node --experimental-sqlite scripts/reset-password.js "client4@pilot.ru" "test123456" 2>&1 || true

            # Финальный отчёт
            echo ""
            echo "═══════════════════════════════"
            echo "  ✅ Deploy complete: \$(date)"
            echo "  DB mode: sqlite (volume)"
            echo "  Users: \$USER_COUNT"
            echo "═══════════════════════════════"
            docker image prune -f
